<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style/style-detail.css?v=1" rel="stylesheet">
    <title>EarthMC 信息查询 — 国家查询</title>
</head>
<body>
    <header id="pageHeader">
        <h1>EarthMC 信息查询</h1>
    </header>
    <nav id="mainNav">
        <a href="index.html">首页</a>
        <a href="players.html">玩家查询</a>
        <a href="towns.html">城镇查询</a>
        <a id="selected" href="nations.html">国家查询</a>
        <a href="about.html">关于</a>
    </nav>
    <main>
    <div id="searchNav">
        <input id="nName" type="text" placeholder="输入要单独查询的国家名称或者uuid" autocomplete="off">
        <button id="searchButton" onclick="search()">正在获取本页数据...</button>
    </div>

    <div id="mainArea">
        <!-- 卡片头部 -->
        <div id="cardHeader">
            <div id="cardIcon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7V9H22V7L12 2ZM4 10V19H7V14H10V19H14V10H4ZM17 10V19H20V10H17Z" fill="currentColor"/>
                </svg>
            </div>
            <div id="cardTitle">
                <h1 id="name"></h1>
                <div id="uuid"></div>
                <div id="onlineBadge">
                    <span id="dynmapColour" style="display:inline-block;width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);vertical-align:middle;margin-right:4px;"></span>
                    <span id="king"></span>
                </div>
            </div>
        </div>

        <!-- 统计图标行 -->
        <div id="statIcons">
            <div class="stat-icon-card">
                <div class="stat-label">城镇</div>
                <div class="stat-value" id="numTowns"></div>
            </div>
            <div class="stat-icon-card">
                <div class="stat-label">居民</div>
                <div class="stat-value" id="numResidents"></div>
            </div>
            <div class="stat-icon-card">
                <div class="stat-label">区块</div>
                <div class="stat-value" id="numTownBlocks"></div>
            </div>
        </div>

        <!-- 详情区 -->
        <div id="detailSections">

            <!-- 公告板 -->
            <div id="board">
                <h2>📋 国家公告</h2>
                <textarea id="boardText"></textarea>
            </div>

            <div class="detail-card">
                <h2>🏛️ 基础信息</h2>
                <div class="detail-row"><span class="label">国王</span><span class="value" id="kingRow"></span></div>
                <div class="detail-row"><span class="label">首都</span><span class="value" id="capital"></span></div>
                <div class="detail-row"><span class="label">创建时间</span><span class="value" id="registered"></span></div>
                <div class="detail-row"><span class="label">Wiki</span><span class="value" id="wiki"></span></div>
            </div>

            <div class="detail-card">
                <h2>⚙️ 国家状态</h2>
                <div class="detail-row"><span class="label">是否公共</span><span class="value" id="isPublic"></span></div>
                <div class="detail-row"><span class="label">是否开放</span><span class="value" id="isOpen"></span></div>
                <div class="detail-row"><span class="label">是否中立</span><span class="value" id="isNeutral"></span></div>
            </div>

            <div class="detail-card">
                <h2>📊 统计数据</h2>
                <div class="detail-row"><span class="label">总区块数</span><span class="value" id="numTownBlocksDetail"></span></div>
                <div class="detail-row"><span class="label">总居民数</span><span class="value" id="numResidentsDetail"></span></div>
                <div class="detail-row"><span class="label">盟友数量</span><span class="value" id="numAllies"></span></div>
                <div class="detail-row"><span class="label">敌国数量</span><span class="value" id="numEnemies"></span></div>
                <div class="detail-row"><span class="label">国家金库</span><span class="value" id="balance"></span></div>
            </div>

            <div class="detail-card" id="coordinates">
                <h2>📍 坐标信息</h2>
                <div class="detail-row">
                    <span class="label">传送点</span>
                    <div class="value">
                        <span class="coord-block"><span class="axis">X</span><span class="val" id="spawn-x"></span></span>
                        <span class="coord-block"><span class="axis">Y</span><span class="val" id="spawn-y"></span></span>
                        <span class="coord-block"><span class="axis">Z</span><span class="val" id="spawn-z"></span></span>
                        <a id="mapLink" href="#" target="_blank">在地图上查看 →</a>
                    </div>
                </div>
            </div>

            <div class="detail-card">
                <h2>🏅 职位信息</h2>
                <div class="detail-row"><span class="label">大臣</span><span class="value" id="Chancellor"></span></div>
                <div class="detail-row"><span class="label">殖民者</span><span class="value" id="Colonist"></span></div>
                <div class="detail-row"><span class="label">外交官</span><span class="value" id="Diplomat"></span></div>
            </div>

            <div class="table-card">
                <h2>🏘️ 所属城镇</h2>
                <table id="townsTable">
                    <thead><tr><th>城镇名称</th><th>uuid</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="table-card">
                <h2>🤝 盟友</h2>
                <table id="alliesTable">
                    <thead><tr><th>盟友名称</th><th>uuid</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="table-card">
                <h2>⚔️ 敌国</h2>
                <table id="enemiesTable">
                    <thead><tr><th>敌国名称</th><th>uuid</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>
    </div>
    </main>
    <footer>
        <p>by 1stikun · <a href="https://github.com/ncnjn123/">GitHub</a></p>
    </footer>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在查询国家信息...</p>
    </div>

    <script src="javascript/js-nationsearch.js"></script>
    <script src="javascript/effects.js"></script>
</body>
</html>
